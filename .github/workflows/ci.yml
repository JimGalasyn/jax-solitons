name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs of the same ref so rapid pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal default GITHUB_TOKEN scope: the test job only checks out + uploads
# coverage (which uses its own CODECOV_TOKEN).
permissions:
  contents: read

jobs:
  test:
    # GitHub-hosted: the suite is CPU-only and all deps are on PyPI (incl.
    # nwt-substrate), so no self-hosted/GPU runner is needed. GPU farming lives
    # in the campaign layer (cloud GPUs), not CI. ubuntu-latest gives parallel
    # matrix jobs and always-on availability.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    env:
      JAX_PLATFORMS: cpu        # deterministic CPU jax in CI
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install (CPU jax)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,oracle]"   # oracle = numpy reference for cross-engine equivalence test
      - name: Test
        run: pytest -v -n auto --cov=jax_solitons --cov-report=xml   # -n auto: parallel across cores
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: false
